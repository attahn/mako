name: Product seeds

# Dry-run / optional product paths that need secrets or cross toolchains.
on:
  workflow_dispatch:
  push:
    paths:
      - "scripts/package-*.sh"
      - "scripts/publish-*.sh"
      - "scripts/cross-target-seed.sh"
      - "packaging/**"
      - ".github/workflows/product-seeds.yml"
      - "src/main.rs"

jobs:
  packaging-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/package-msi-seed.sh
      - run: bash scripts/package-notarize-seed.sh
      - run: bash scripts/publish-homebrew-tap-seed.sh
      - run: bash scripts/publish-winget-seed.sh

  cross-compile-seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install clang + zig (optional cross)
        run: |
          sudo apt-get update
          sudo apt-get install -y clang
          # zig often speeds cross; continue if missing
          if ! command -v zig; then
            curl -sL https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz | tar -xJ
            echo "$PWD/zig-linux-x86_64-0.13.0" >> "$GITHUB_PATH"
          fi
        continue-on-error: true
      - name: Build host mako
        run: cargo build --release
      - name: Cross-target seed script
        run: bash scripts/cross-target-seed.sh
      - name: Smoke --target list via mako help
        run: ./target/release/mako build --help | head -40

  # Signed MSI / notarize only when secrets present (otherwise skip).
  release-sign-optional:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: MSI dry-run
        run: bash scripts/package-msi-seed.sh
      - name: Notarize dry-run (needs APPLE_* secrets for real run)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bash scripts/package-notarize-seed.sh
      - name: Note
        run: |
          echo "Real Authenticode/notarize requires secrets + platform runners."
          echo "See scripts/package-msi-notes.md and package-macos-notarize-notes.md"
