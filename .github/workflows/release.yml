name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: mako-aarch64-apple-darwin
          - os: ubuntu-latest
            artifact: mako-x86_64-unknown-linux-gnu
          - os: windows-latest
            artifact: mako-x86_64-pc-windows-msvc
            exe: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install clang (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        run: choco install llvm -y
        continue-on-error: true

      - name: Build release
        run: cargo build --release

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          ./scripts/package-release.sh "${{ matrix.artifact }}"
        env:
          ARTIFACT_NAME: ${{ matrix.artifact }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./scripts/package-release.ps1 -ArtifactName "${{ matrix.artifact }}"

      - name: Release install smoke (Unix)
        if: runner.os != 'Windows'
        run: |
          ./scripts/install-release.sh \
            --base-url "file://$PWD/dist" \
            --artifact "${{ matrix.artifact }}" \
            --prefix "$RUNNER_TEMP/mako-release-install"

      - name: Release install smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $InstallPrefix = Join-Path $env:RUNNER_TEMP "mako-release-install"
          $ExtractRoot = Join-Path $env:RUNNER_TEMP "mako-release-extract"
          Expand-Archive -Path "dist\${{ matrix.artifact }}.zip" -DestinationPath $ExtractRoot -Force
          $ArtifactRoot = Join-Path $ExtractRoot "${{ matrix.artifact }}"
          & (Join-Path $ArtifactRoot "scripts\install.ps1") -Prefix $InstallPrefix -SkipBuild
          $env:MAKO_RUNTIME = Join-Path $InstallPrefix "share\mako\runtime"
          $env:MAKO_STD = Join-Path $InstallPrefix "share\mako\std"
          Push-Location $env:RUNNER_TEMP
          try {
            & (Join-Path $InstallPrefix "bin\mako.exe") doctor
          } finally {
            Pop-Location
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}*
            dist/install-release.sh

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}*

      - name: Publish GitHub Release bootstrapper
        if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'Linux'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/install-release.sh

  # Optional: also produce linux aarch64 via zig when tagging from ubuntu.
  cross-linux-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - name: Install zig
        run: |
          sudo apt-get update && sudo apt-get install -y xz-utils
          curl -sL https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz | sudo tar -xJ -C /opt
          echo "/opt/zig-linux-x86_64-0.13.0" >> "$GITHUB_PATH"
      - name: Cross-build mako CLI (Rust)
        run: |
          # Prefer cargo zigbuild if present; else skip CLI cross and only note.
          cargo install cargo-zigbuild --locked || true
          if command -v cargo-zigbuild >/dev/null 2>&1 || cargo zigbuild -h >/dev/null 2>&1; then
            cargo zigbuild --release --target aarch64-unknown-linux-gnu
            mkdir -p dist
            cp target/aarch64-unknown-linux-gnu/release/mako dist/mako-aarch64-unknown-linux-gnu
            chmod +x dist/mako-aarch64-unknown-linux-gnu
            tar -C dist -czf dist/mako-aarch64-unknown-linux-gnu.tar.gz mako-aarch64-unknown-linux-gnu
            # Bundle runtime headers alongside
            mkdir -p dist/runtime-headers
            cp runtime/*.h dist/runtime-headers/
            tar -C dist -czf dist/mako-aarch64-unknown-linux-gnu-runtime.tar.gz runtime-headers
          else
            echo "cargo-zigbuild unavailable — skipping aarch64 CLI artifact"
            exit 0
          fi
      - name: Upload aarch64
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mako-aarch64-unknown-linux-gnu
          path: dist/mako-aarch64-unknown-linux-gnu*
          if-no-files-found: ignore
